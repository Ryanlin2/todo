name: CI
on:
  push:
  pull_request:
jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Start server
        run: npm start &

      - name: Wait for server
        run: npx wait-on http://localhost:3000/todos

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: docker build -t todo-api .