name: CI

on:
  push:

permissions:
  contents: read

jobs:
  test:
    name: Test Docker image on Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build test image
        run: |
          docker build \
            --build-arg NODE_VERSION=${{ matrix.node-version }}-alpine \
            --target test \
            -t app-test:${{ matrix.node-version }} .

      - name: Run tests in container
        run: docker run --rm app-test:${{ matrix.node-version }}